<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <style>
        .offcanvas { width: 300px !important; }
        .nav-link { color: #333; font-weight: 500; padding: 15px 20px; border-bottom: 1px solid #f0f0f0; }
        .nav-link:hover { background-color: #f8f9fa; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Eli Mini Market</span>
            <div class="d-flex align-items-center">
                <span class="text-white me-3 d-none d-md-inline" id="nombre-vendedor">Vendedor: ---</span>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="menuLateral">
    <div class="offcanvas-header bg-dark text-white">
        <h5 class="offcanvas-title">Panel de Control</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
        <nav class="nav flex-column">
            <a class="nav-link active bg-light" href="index.html">Punto de Venta</a>

            <div>
                <a class="nav-link d-flex justify-content-between align-items-center" href="caja.html">
                    Gestión de Caja
                </a>
            </div>

            <div>
                <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#menuStock">
                    Inventario
                    <small>▼</small>
                </a>
                <div class="collapse bg-light" id="menuStock">
                    <a class="nav-link ps-4 py-2 small" href="productos.html">Lista de Productos</a>
                    <a class="nav-link ps-4 py-2 small" href="proveedores.html">Proveedores</a>
                    <a class="nav-link ps-4 py-2 small" href="precios.html">Actualizar Precios</a>
                </div>
            </div>

            <div>
                <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#menuReportes">
                    Reportes
                    <small>▼</small>
                </a>
                <div class="collapse bg-light" id="menuReportes">
                    <a class="nav-link ps-4 py-2 small" href="ventas-dia.html">Ventas del Dia</a>
                    <a class="nav-link ps-4 py-2 small" href="estadisticas.html">Estadisticas Mensuales</a>
                </div>
            </div>
        </nav>
        
        <div class="mt-auto p-3 border-top">
            <button class="btn btn-danger w-100" id="btn-logout">Cerrar Sesion</button>
        </div>
    </div>
</div>

    <div class="container-fluid px-4">
        <div class="row">
            
            <div class="col-md-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="input-codigo" class="form-label fw-bold">Escanear Codigo de Barras</label>
                            <input type="text" class="form-control form-control-lg" id="input-codigo" placeholder="Esperando lectura..." autocomplete="off">
                        </div>

                        <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                            <table class="table table-hover align-middle">
                                <thead class="table-light sticky-top">
                                    <tr>
                                        <th>Producto</th>
                                        <th>Precio Uni.</th>
                                        <th>Cantidad</th>
                                        <th>Subtotal</th>
                                        <th>Accion</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-carrito">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm border-primary">
                    <div class="card-body text-center">
                        <h4 class="card-title text-muted">Total a Pagar</h4>
                        <h1 class="display-3 fw-bold text-primary mb-4" id="total-venta">$0.00</h1>
                        
                        <div class="d-flex justify-content-center mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="check-ticket" style="transform: scale(1.3); margin-right: 10px;">
                                <label class="form-check-label text-muted fw-bold" for="check-ticket">Imprimir ticket</label>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-3">
                            <button class="btn btn-success btn-lg fw-bold" id="btn-pago-efectivo">
                                Cobrar en Efectivo
                            </button>
                            <button class="btn btn-info btn-lg text-white fw-bold" id="btn-pago-digital">
                                Transferencia / QR
                            </button>
                            
                            <hr class="mt-2 mb-0">

                            <div class="text-center">
                                <small class="text-muted fw-bold" style="font-size: 0.7rem; letter-spacing: 0.5px; line-height: 1;">
                                    ACCIONES RÁPIDAS
                                </small>
                            </div>

                            <button class="btn btn-warning fw-bold mt-0" id="btn-registrar-gasto">
                                Registrar Gasto
                            </button>

                            <button class="btn btn-outline-secondary py-2 small fw-bold mt-2" 
                                    id="btn-reimprimir-ultimo" 
                                    style="border-style: dashed; background-color: transparent !important; color: #6c757d !important; transition: none;">
                                Reimprimir Ultimo Ticket
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/ventas.js"></script>
</body>
</html>
