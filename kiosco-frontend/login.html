<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Kiosco</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Un pequeño efecto para que la alerta no mueva todo bruscamente */
        #alert-container {
            min-height: 60px; 
        }
        .card { border: none; border-radius: 15px; }
    </style>
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div id="alert-container"></div>

                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4 fw-bold">Iniciar Sesión</h3>
                        <form id="form-login" novalidate>
                            <div class="mb-3">
                                <label class="form-label">Usuario</label>
                                <input type="text" id="usuario" class="form-control form-control-lg">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="password" class="form-control form-control-lg">
                            </div>
                            <button type="submit" id="btn-entrar" class="btn btn-primary w-100 btn-lg mt-2">
                                Entrar
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
