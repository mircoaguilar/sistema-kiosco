<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Productos</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <style>
        .table-responsive {
            max-height: 65vh;
            overflow-y: auto;
        }

        .sticky-top {
            top: -1px;
            z-index: 1020;
        }

        .offcanvas { 
            width: 300px !important; 
        }

        .nav-link { 
            color: #333; 
            font-weight: 500; 
            padding: 15px 20px; 
            border-bottom: 1px solid #f0f0f0; 
            transition: 0.3s; 
        } 

        .nav-link:hover { 
            background-color: #f8f9fa; 
        } 
    </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Eli Mini Market</span>
        <div class="d-flex align-items-center">
            <span class="text-white me-3 d-none d-md-inline" id="nombre-vendedor">Vendedor: ---</span>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </div>
</nav>

<!-- SIDEBAR -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="menuLateral">
    <div class="offcanvas-header bg-dark text-white">
        <h5 class="offcanvas-title">Panel de Control</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body p-0 d-flex flex-column">
        <nav class="nav flex-column">
            <a class="nav-link" href="index.html">Punto de Venta</a>
            <a class="nav-link" href="caja.html">Gestión de Caja</a>

            <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#menuStock">
                Inventario <small>▼</small>
            </a>
            <div class="collapse bg-light" id="menuStock">
                <a class="nav-link ps-4 py-2 small" href="productos.html">Lista de Productos</a>
                <a class="nav-link ps-4 py-2 small" href="proveedores.html">Proveedores</a>
            </div>

            <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#menuReportes">
                Reportes <small>▲</small>
            </a>
            <div class="collapse show bg-light" id="menuReportes">
                <a class="nav-link ps-4 py-2 small" href="ventas-dia.html">Ventas</a>
                <a class="nav-link ps-4 py-2 small fw-bold text-primary" href="top-productos.html">
                    Top Productos
                </a>
            </div>
        </nav>

        <div class="mt-auto p-3 border-top">
            <button class="btn btn-danger w-100" id="btn-logout">Cerrar Sesión</button>
        </div>
    </div>
</div>

<!-- CONTENIDO -->
<div class="container-fluid px-4">

    <h4 class="mb-3 fw-bold">Top Productos</h4>

    <!-- FILTROS -->
    <div class="card shadow-sm mb-3">
        <div class="card-body">

            <div class="row g-3 align-items-end">

                <div class="col-md-3">
                    <label class="form-label small fw-bold">Desde</label>
                    <input type="date" id="filtro-desde" class="form-control">
                </div>

                <div class="col-md-3">
                    <label class="form-label small fw-bold">Hasta</label>
                    <input type="date" id="filtro-hasta" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label small fw-bold">Categoría</label>
                    <select id="filtro-categoria" class="form-select">
                        <option value="">Todas las categorías</option>
                    </select>
                </div>

                <div class="col-12 d-flex justify-content-end">
                    <button id="btn-limpiar" class="btn btn-secondary">
                        Limpiar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- TABLA -->
    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <h5 class="mb-0 fw-bold">Ranking de Productos</h5>
        </div>

        <div class="card-body">

            <div class="table-responsive border rounded">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light sticky-top">
                        <tr>
                            <th>#</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                        </tr>
                    </thead>

                    <tbody id="tabla-top">
                        <tr>
                            <td colspan="3" class="text-center py-4 text-muted">
                                Cargando datos...
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/top-productos.js"></script>

</body>
</html>
